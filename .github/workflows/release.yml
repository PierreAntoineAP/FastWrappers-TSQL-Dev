name: Create Release Artifacts

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      
      - name: Setup NuGet
        uses: nuget/setup-nuget@v2
      
      - name: Restore NuGet packages
        run: nuget restore FastWrappers-TSQL.sln
      
      - name: Build SQL Project
        run: msbuild FastWrappers_TSQL.sqlproj /p:Configuration=Release /p:Platform="Any CPU" /t:Build
      
      - name: Verify Build Artifacts
        shell: powershell
        run: |
          Write-Host "Checking for build output..."
          if (Test-Path "bin") {
            Get-ChildItem -Path "bin" -Recurse -File | Format-Table FullName, Length
          } else {
            Write-Host "bin folder does not exist!"
          }
          
          # Check for DACPAC in bin\Output (SQL Projects output here)
          $dacpacPath = "bin\Output\FastWrappers_TSQL.dacpac"
          if (Test-Path $dacpacPath) {
            Write-Host "DACPAC found at: $dacpacPath"
          } else {
            Write-Host "DACPAC not found at: $dacpacPath"
            Write-Host "Looking for .dacpac files..."
            Get-ChildItem -Path . -Filter "*.dacpac" -Recurse -ErrorAction SilentlyContinue | Format-Table FullName
            exit 1
          }
      
      - name: Setup SQL Server (LocalDB)
        shell: powershell
        run: |
          # Start SQL LocalDB
          sqllocaldb create MSSQLLocalDB
          sqllocaldb start MSSQLLocalDB
          
          # Wait for SQL Server to be ready
          Start-Sleep -Seconds 10
      
      - name: Deploy Database and Create Artifacts
        shell: powershell
        run: |
          # Variables
          $serverInstance = "(localdb)\MSSQLLocalDB"
          $dbName = "FastWrappers-TSQL"
          $dacpacPath = "bin\Output\FastWrappers_TSQL.dacpac"
          $outputDir = "bin\Release"
          $bacpacPath = "$outputDir\FastWrappers-TSQL.bacpac"
          $bakPath = "$outputDir\FastWrappers-TSQL.bak"
          $generatedSqlPath = "$outputDir\FastWrappers-TSQL.sql"
          
          # Ensure output directory exists
          if (!(Test-Path $outputDir)) {
              Write-Host "Creating $outputDir directory..."
              New-Item -Path $outputDir -ItemType Directory -Force | Out-Null
          }
          
          # Verify DACPAC exists
          if (!(Test-Path $dacpacPath)) {
              Write-Error "DACPAC not found at: $dacpacPath"
              exit 1
          }
          
          # Download SqlPackage if needed
          if (!(Test-Path "SqlPackage\SqlPackage.exe")) {
              Write-Host "Downloading SqlPackage..."
              Invoke-WebRequest -Uri "https://aka.ms/sqlpackage-windows" -OutFile "SqlPackage.zip"
              Expand-Archive -Path "SqlPackage.zip" -DestinationPath "SqlPackage" -Force
              Remove-Item "SqlPackage.zip"
          }
          
          $sqlPackage = "SqlPackage\SqlPackage.exe"
          
          # Calculate SHA2-512 hash of the DLL for trusted assembly
          $dllPath = "bin\Output\FastWrappers_TSQL.dll"
          Write-Host "Calculating SHA2-512 hash for trusted assembly..."
          $dllBytes = [System.IO.File]::ReadAllBytes((Resolve-Path $dllPath).Path)
          $sha512 = [System.Security.Cryptography.SHA512]::Create()
          $hashBytes = $sha512.ComputeHash($dllBytes)
          $hashHex = [System.BitConverter]::ToString($hashBytes).Replace("-", "")
          Write-Host "DLL Hash: 0x$hashHex"
          
          # Add assembly as trusted before deployment (for SQL Server 2017+ with clr strict security)
          Write-Host "Adding assembly as trusted..."
          $addTrustedAssembly = @"
EXEC sys.sp_add_trusted_assembly 
    @hash = 0x$hashHex,
    @description = N'FastWrappers_TSQL - CLR Wrapper for FastTransfer and FastBCP';
"@
          sqlcmd -S $serverInstance -Q $addTrustedAssembly
          
          # Deploy the DACPAC to create the database
          Write-Host "Deploying DACPAC to create database..."
          & $sqlPackage /Action:Publish /SourceFile:$dacpacPath /TargetServerName:$serverInstance /TargetDatabaseName:$dbName /p:IncludeCompositeObjects=True
          
          if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to deploy DACPAC"
              exit 1
          }
          
          # Wait for deployment to complete
          Start-Sleep -Seconds 5
          
          # Export to BACPAC
          Write-Host "Exporting to BACPAC..."
          & $sqlPackage /Action:Export /SourceServerName:$serverInstance /SourceDatabaseName:$dbName /TargetFile:$bacpacPath
          
          if ($LASTEXITCODE -ne 0) {
              Write-Warning "Failed to create BACPAC, continuing..."
          }
          
          # Create backup file
          Write-Host "Creating SQL Server backup..."
          $bakFullPath = Join-Path $PWD $bakPath
          sqlcmd -S $serverInstance -Q "BACKUP DATABASE [$dbName] TO DISK = N'$bakFullPath' WITH STATS = 10"
          
          if ($LASTEXITCODE -ne 0) {
              Write-Warning "Failed to create BAK file, continuing..."
          }
          
          # Generate installation script with trusted assembly setup
          Write-Host "Generating installation script with trusted assembly..."
          $installScriptPath = "$outputDir\Install-TrustedAssembly.sql"
          $installScript = @"
-- =============================================
-- FastWrappers-TSQL Installation Script
-- For SQL Server 2017+ with CLR Strict Security
-- =============================================
-- This script must be run as sysadmin
-- =============================================

USE master;
GO

-- Check SQL Server version and clr strict security
DECLARE @version INT = CAST(SERVERPROPERTY('ProductMajorVersion') AS INT);
DECLARE @strictSec INT;

EXEC sp_configure 'show advanced options', 1;
RECONFIGURE;

SELECT @strictSec = CAST(value_in_use AS INT) 
FROM sys.configurations 
WHERE name = 'clr strict security';

PRINT 'SQL Server Version: ' + CAST(@version AS VARCHAR);
PRINT 'CLR Strict Security: ' + CAST(@strictSec AS VARCHAR);

-- Enable CLR
EXEC sp_configure 'clr enabled', 1;
RECONFIGURE;
GO

-- Add FastWrappers_TSQL as trusted assembly (SQL Server 2017+)
-- This allows the assembly to load even with clr strict security enabled
IF NOT EXISTS (SELECT 1 FROM sys.trusted_assemblies WHERE [hash] = 0x$hashHex)
BEGIN
    EXEC sys.sp_add_trusted_assembly 
        @hash = 0x$hashHex,
        @description = N'FastWrappers_TSQL, Version=0.5.1.0, Culture=neutral, PublicKeyToken=53f6bd85035abe03';
    PRINT 'Added FastWrappers_TSQL as trusted assembly';
END
ELSE
BEGIN
    PRINT 'FastWrappers_TSQL already in trusted assemblies';
END
GO

-- Now restore the database or deploy DACPAC
-- Example for backup restore:
-- RESTORE DATABASE [FastWrappers-TSQL] FROM DISK = 'FastWrappers-TSQL.bak';
-- GO

-- Set TRUSTWORTHY ON (still required for UNSAFE assemblies)
-- ALTER DATABASE [FastWrappers-TSQL] SET TRUSTWORTHY ON;
-- GO

-- Test
-- USE [FastWrappers-TSQL];
-- SELECT dbo.EncryptString('test');
"@
          
          $installScript | Out-File -FilePath $installScriptPath -Encoding UTF8
          Write-Host "Installation script created: $installScriptPath"
          
          # Generate SQL script from DACPAC (includes the compiled binary)
          Write-Host "Generating SQL script from DACPAC..."
          & $sqlPackage /Action:Script /SourceFile:$dacpacPath /OutputPath:$generatedSqlPath /p:IncludeCompositeObjects=True
          
          if ($LASTEXITCODE -ne 0) {
              Write-Warning "Failed to generate SQL script, continuing..."
          }
          
          # Copy DACPAC with proper name
          Write-Host "Copying DACPAC with release name..."
          Copy-Item $dacpacPath "$outputDir\FastWrappers-TSQL.dacpac" -Force
          
          # List all created artifacts
          Write-Host "`nCreated artifacts:"
          Get-ChildItem -Path $outputDir -File | Format-Table Name, Length
          
          Write-Host "All artifacts processing completed!"
      
      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Prepare Release Files
        shell: powershell
        run: |
          # Create a release directory with all available artifacts
          New-Item -Path "release" -ItemType Directory -Force | Out-Null
          
          # Copy available files
          $files = @(
              @{Source="bin\Release\FastWrappers-TSQL.dacpac"; Name="FastWrappers-TSQL.dacpac"},
              @{Source="bin\Release\FastWrappers-TSQL.bacpac"; Name="FastWrappers-TSQL.bacpac"},
              @{Source="bin\Release\FastWrappers-TSQL.bak"; Name="FastWrappers-TSQL.bak"},
              @{Source="bin\Release\FastWrappers-TSQL.sql"; Name="FastWrappers-TSQL.sql"},
              @{Source="bin\Release\Install-TrustedAssembly.sql"; Name="Install-TrustedAssembly.sql"}
          )
          
          foreach ($file in $files) {
              if (Test-Path $file.Source) {
                  Copy-Item $file.Source "release\$($file.Name)" -Force
                  Write-Host "Copied $($file.Name)"
              } else {
                  Write-Warning "$($file.Name) not found, skipping"
              }
          }
          
          Write-Host "`nRelease files:"
          Get-ChildItem -Path "release" | Format-Table Name, Length
      
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## FastWrappers-TSQL v${{ steps.get_version.outputs.VERSION }}
            
            ### 📦 Installation Files
            
            - **Install-TrustedAssembly.sql** - ⭐ **REQUIRED FIRST** for SQL Server 2017+ (adds assembly to trusted list)
            - **FastWrappers-TSQL.dacpac** - Data-tier Application Package (for Visual Studio / SQL Server Data Tools)
            - **FastWrappers-TSQL.bacpac** - Binary Application Package (for import/export between servers)
            - **FastWrappers-TSQL.bak** - SQL Server Backup (compatible with SQL Server 2016+, restore using SSMS)
            - **FastWrappers-TSQL.sql** - SQL Script (execute using sqlcmd or SSMS)
            
            ### 🚀 Installation Instructions
            
            #### For SQL Server 2017+ (with CLR Strict Security)
            
            **Step 1: Run Install-TrustedAssembly.sql first** (as sysadmin)
            ```sql
            -- This adds the assembly to sys.trusted_assemblies
            -- Run this once per SQL Server instance
            sqlcmd -S YourServer -E -i Install-TrustedAssembly.sql
            ```
            
            **Step 2: Restore database**
            ```sql
            RESTORE DATABASE [FastWrappers-TSQL] FROM DISK = 'FastWrappers-TSQL.bak';
            GO
            
            ALTER DATABASE [FastWrappers-TSQL] SET TRUSTWORTHY ON;
            GO
            ```
            
            **Step 3: Test**
            ```sql
            USE [FastWrappers-TSQL];
            SELECT dbo.EncryptString('test');
            ```
            
            #### For SQL Server 2016 or with CLR Strict Security disabled
            
            ```sql
            -- Enable CLR
            EXEC sp_configure 'show advanced options', 1; RECONFIGURE;
            EXEC sp_configure 'clr enabled', 1; RECONFIGURE;
            GO
            
            -- Restore database
            RESTORE DATABASE [FastWrappers-TSQL] FROM DISK = 'FastWrappers-TSQL.bak';
            GO
            
            ALTER DATABASE [FastWrappers-TSQL] SET TRUSTWORTHY ON;
            GO
            ```
            
            ### 📖 Documentation
            
            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for usage examples.
            
            ### ⚠️ Important Notes
            
            - SQL Server 2017+ requires running **Install-TrustedAssembly.sql** first due to CLR strict security
            - The assembly is signed and requires UNSAFE permission set
            - TRUSTWORTHY ON is required for proper operation
          files: |
            release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
