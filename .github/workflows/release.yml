name: Create Release Artifacts

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      
      - name: Setup NuGet
        uses: nuget/setup-nuget@v2
      
      - name: Restore NuGet packages
        run: nuget restore FastWrappers-TSQL.sln
      
      - name: Build SQL Project
        run: msbuild FastWrappers_TSQL.sqlproj /p:Configuration=Release /p:Platform="Any CPU" /t:Build
      
      - name: Create and Sign Assembly Certificate
        shell: powershell
        run: |
          # Create self-signed certificate for SQL CLR assembly signing
          Write-Host "Creating certificate for assembly signing..."
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=FastWrappers SQLCLR Assembly" `
            -KeyExportPolicy Exportable `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(10) `
            -KeyAlgorithm RSA `
            -KeyLength 2048
          
          # Export public certificate for SQL Server
          $certPath = "bin\Output\FastWrappers-Certificate.cer"
          Export-Certificate -Cert $cert -FilePath $certPath -Force
          Write-Host "Certificate exported to: $certPath"
          
          # Sign the compiled DLL
          $dllPath = "bin\Output\FastWrappers_TSQL.dll"
          if (Test-Path $dllPath) {
            Write-Host "Signing assembly DLL..."
            Set-AuthenticodeSignature -FilePath $dllPath -Certificate $cert -TimestampServer "http://timestamp.digicert.com"
            Write-Host "Assembly signed successfully"
          } else {
            Write-Error "DLL not found at: $dllPath"
            exit 1
          }
          
          # Get certificate thumbprint for documentation
          $thumbprint = $cert.Thumbprint
          Write-Host "Certificate Thumbprint: $thumbprint"
      
      - name: Generate Certificate Installation Script
        shell: powershell
        run: |
          $installScript = @"
          -- =============================================
          -- FastWrappers-TSQL Certificate Installation
          -- =============================================
          -- This script must be run ONCE on each SQL Server instance
          -- before deploying FastWrappers-TSQL databases.
          --
          -- Prerequisites:
          --   1. Place FastWrappers-Certificate.cer in an accessible location
          --   2. Update the file path below to match your certificate location
          --   3. Run this script as sysadmin
          -- =============================================
          
          USE master;
          GO
          
          -- Clean up existing certificate and login (if re-installing)
          IF EXISTS (SELECT * FROM sys.server_principals WHERE name = 'FastWrappersLogin')
              DROP LOGIN FastWrappersLogin;
          GO
          
          IF EXISTS (SELECT * FROM sys.certificates WHERE name = 'FastWrappersCert')
              DROP CERTIFICATE FastWrappersCert;
          GO
          
          -- Create certificate from the .cer file
          -- IMPORTANT: Update the path to where you placed the certificate file
          CREATE CERTIFICATE FastWrappersCert
          FROM FILE = 'C:\Path\To\FastWrappers-Certificate.cer';
          GO
          
          -- Create login from certificate
          CREATE LOGIN FastWrappersLogin
          FROM CERTIFICATE FastWrappersCert;
          GO
          
          -- Grant UNSAFE ASSEMBLY permission to the login
          GRANT UNSAFE ASSEMBLY TO FastWrappersLogin;
          GO
          
          -- Verification
          PRINT 'Certificate and login created successfully!';
          PRINT 'You can now deploy FastWrappers-TSQL databases without TRUSTWORTHY ON.';
          GO
          "@
          
          $installScript | Out-File -FilePath "bin\Output\Install-Certificate.sql" -Encoding UTF8
          Write-Host "Certificate installation script created"
      
      - name: Verify Build Artifacts
        shell: powershell
        run: |
          Write-Host "Checking for build output..."
          if (Test-Path "bin") {
            Get-ChildItem -Path "bin" -Recurse -File | Format-Table FullName, Length
          } else {
            Write-Host "bin folder does not exist!"
          }
          
          # Check for DACPAC in bin\Output (SQL Projects output here)
          $dacpacPath = "bin\Output\FastWrappers_TSQL.dacpac"
          if (Test-Path $dacpacPath) {
            Write-Host "DACPAC found at: $dacpacPath"
          } else {
            Write-Host "DACPAC not found at: $dacpacPath"
            Write-Host "Looking for .dacpac files..."
            Get-ChildItem -Path . -Filter "*.dacpac" -Recurse -ErrorAction SilentlyContinue | Format-Table FullName
            exit 1
          }
      
      - name: Setup SQL Server (LocalDB)
        shell: powershell
        run: |
          # Start SQL LocalDB
          sqllocaldb create MSSQLLocalDB
          sqllocaldb start MSSQLLocalDB
          
          # Wait for SQL Server to be ready
          Start-Sleep -Seconds 10
      
      - name: Deploy Database and Create Artifacts
        shell: powershell
        run: |
          # Variables
          $serverInstance = "(localdb)\MSSQLLocalDB"
          $dbName = "FastWrappers-TSQL"
          $dacpacPath = "bin\Output\FastWrappers_TSQL.dacpac"
          $outputDir = "bin\Release"
          $bacpacPath = "$outputDir\FastWrappers-TSQL.bacpac"
          $bakPath = "$outputDir\FastWrappers-TSQL.bak"
          $generatedSqlPath = "$outputDir\FastWrappers-TSQL.sql"
          
          # Ensure output directory exists
          if (!(Test-Path $outputDir)) {
              Write-Host "Creating $outputDir directory..."
              New-Item -Path $outputDir -ItemType Directory -Force | Out-Null
          }
          
          # Verify DACPAC exists
          if (!(Test-Path $dacpacPath)) {
              Write-Error "DACPAC not found at: $dacpacPath"
              exit 1
          }
          
          # Download SqlPackage if needed
          if (!(Test-Path "SqlPackage\SqlPackage.exe")) {
              Write-Host "Downloading SqlPackage..."
              Invoke-WebRequest -Uri "https://aka.ms/sqlpackage-windows" -OutFile "SqlPackage.zip"
              Expand-Archive -Path "SqlPackage.zip" -DestinationPath "SqlPackage" -Force
              Remove-Item "SqlPackage.zip"
          }
          
          $sqlPackage = "SqlPackage\SqlPackage.exe"
          
          # Deploy the DACPAC to create the database
          Write-Host "Deploying DACPAC to create database..."
          & $sqlPackage /Action:Publish /SourceFile:$dacpacPath /TargetServerName:$serverInstance /TargetDatabaseName:$dbName /p:IncludeCompositeObjects=True
          
          if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to deploy DACPAC"
              exit 1
          }
          
          # Wait for deployment to complete
          Start-Sleep -Seconds 5
          
          # Export to BACPAC
          Write-Host "Exporting to BACPAC..."
          & $sqlPackage /Action:Export /SourceServerName:$serverInstance /SourceDatabaseName:$dbName /TargetFile:$bacpacPath
          
          if ($LASTEXITCODE -ne 0) {
              Write-Warning "Failed to create BACPAC, continuing..."
          }
          
          # Create .bak file with compatibility level for SQL Server 2016 (without compression for Express)
          Write-Host "Creating SQL Server 2016 compatible backup..."
          $bakFullPath = Join-Path $PWD $bakPath
          sqlcmd -S $serverInstance -Q "ALTER DATABASE [$dbName] SET COMPATIBILITY_LEVEL = 130; BACKUP DATABASE [$dbName] TO DISK = N'$bakFullPath' WITH STATS = 10"
          
          if ($LASTEXITCODE -ne 0) {
              Write-Warning "Failed to create BAK file, continuing..."
          }
          
          # Generate SQL deployment script from DACPAC
          Write-Host "Generating SQL script from DACPAC..."
          & $sqlPackage /Action:Script /SourceFile:$dacpacPath /TargetServerName:$serverInstance /TargetDatabaseName:"${dbName}_Script" /OutputPath:$generatedSqlPath /p:IncludeCompositeObjects=True /p:CommentOutSetVarDeclarations=True
          
          if ($LASTEXITCODE -ne 0) {
              Write-Warning "Failed to generate SQL script, continuing..."
          }
          
          # Copy DACPAC with proper name
          Write-Host "Copying DACPAC with release name..."
          Copy-Item $dacpacPath "$outputDir\FastWrappers-TSQL.dacpac" -Force
          
          # List all created artifacts
          Write-Host "`nCreated artifacts:"
          Get-ChildItem -Path $outputDir -File | Format-Table Name, Length
          
          Write-Host "All artifacts processing completed!"
      
      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Prepare Release Files
        shell: powershell
        run: |
          # Create a release directory with all available artifacts
          New-Item -Path "release" -ItemType Directory -Force | Out-Null
          
          # Copy available files
          $files = @(
              @{Source="bin\Release\FastWrappers-TSQL.dacpac"; Name="FastWrappers-TSQL.dacpac"},
              @{Source="bin\Release\FastWrappers-TSQL.bacpac"; Name="FastWrappers-TSQL.bacpac"},
              @{Source="bin\Release\FastWrappers-TSQL.bak"; Name="FastWrappers-TSQL.bak"},
              @{Source="bin\Release\FastWrappers-TSQL.sql"; Name="FastWrappers-TSQL.sql"},
              @{Source="bin\Output\FastWrappers-Certificate.cer"; Name="FastWrappers-Certificate.cer"},
              @{Source="bin\Output\Install-Certificate.sql"; Name="Install-Certificate.sql"}
          )
          
          foreach ($file in $files) {
              if (Test-Path $file.Source) {
                  Copy-Item $file.Source "release\$($file.Name)" -Force
                  Write-Host "Copied $($file.Name)"
              } else {
                  Write-Warning "$($file.Name) not found, skipping"
              }
          }
          
          Write-Host "`nRelease files:"
          Get-ChildItem -Path "release" | Format-Table Name, Length
      
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## FastWrappers-TSQL v${{ steps.get_version.outputs.VERSION }}
            
            ### 🔒 Security Notice - Certificate-Based Installation (No TRUSTWORTHY Required!)
            
            This release includes a **signed assembly** that eliminates the need for `TRUSTWORTHY ON`.
            
            #### One-Time Server Setup (Required Before First Use)
            
            1. Download `FastWrappers-Certificate.cer` and `Install-Certificate.sql`
            2. Place the certificate file in an accessible location (e.g., `C:\Certificates\`)
            3. Edit `Install-Certificate.sql` and update the certificate file path
            4. Run `Install-Certificate.sql` as **sysadmin** on your SQL Server instance
            
            **This setup is done ONCE per SQL Server instance.**
            
            #### After Certificate Installation
            
            You can then deploy FastWrappers-TSQL using any method below **WITHOUT** `TRUSTWORTHY ON`:
            
            ---
            
            ### 📦 Installation Methods
            
            - **FastWrappers-TSQL.dacpac** - Data-tier Application Package (recommended for Visual Studio / SQL Server Data Tools)
            - **FastWrappers-TSQL.bacpac** - Binary Application Package (for import/export between servers)
            - **FastWrappers-TSQL.bak** - SQL Server Backup (compatible with SQL Server 2016+, restore using SSMS)
            - **FastWrappers-TSQL.sql** - Pure SQL Script (execute using sqlcmd or SSMS)
            
            ### 🔐 Security Files
            
            - **FastWrappers-Certificate.cer** - Public certificate for SQL Server (required for installation)
            - **Install-Certificate.sql** - Installation script for certificate setup
            
            ### ⚙️ Server Configuration
            
            Once the certificate is installed, you still need to enable CLR:
            
            ```sql
            EXEC sp_configure 'show advanced options', 1;
            RECONFIGURE;
            EXEC sp_configure 'clr enabled', 1;
            RECONFIGURE;
            ```
            
            ### Usage
            
            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for usage examples.
          files: |
            release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
